<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relay Control</title>
<style>
:root {
  --bg:#0d0f11; --bg2:#141618; --bg3:#1c1f22; --bg4:#22262a;
  --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.13);
  --text:#eef0f2; --text2:#7a8490; --text3:#3e4449;
  --accent:#3b9eff; --on:#22c55e; --warn:#f59e0b; --danger:#ef4444;
  --r:10px; --rl:16px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;}

/* LOGIN */
.login-page{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:1000;}
.login-box{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--rl);padding:2rem;width:300px;text-align:center;}
.login-logo{font-size:32px;margin-bottom:.5rem;}
.login-title{font-size:16px;font-weight:600;margin-bottom:.25rem;}
.login-sub{font-size:12px;color:var(--text3);margin-bottom:1.5rem;}
.login-input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-size:15px;padding:10px 14px;outline:none;margin-bottom:10px;text-align:center;letter-spacing:.15em;}
.login-input:focus{border-color:var(--accent);}
.login-btn{width:100%;padding:10px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;border:none;background:var(--accent);color:#fff;}
.login-err{font-size:12px;color:var(--danger);margin-top:.6rem;min-height:16px;}

/* NAV */
nav{display:flex;align-items:center;justify-content:space-between;padding:0 1.25rem;height:52px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:100;}
.logo{font-size:14px;font-weight:600;color:var(--accent);}
.cstatus{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text3);}
.cdot{width:7px;height:7px;border-radius:50%;background:var(--text3);}
.cdot.ok{background:var(--on);box-shadow:0 0 5px var(--on);}
.logout-btn{font-size:12px;color:var(--text3);background:none;border:none;cursor:pointer;padding:4px 8px;border-radius:6px;}
.logout-btn:hover{color:var(--text);background:var(--bg3);}

.wrap{padding:1.25rem;max-width:960px;margin:0 auto;}

/* CARD */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:1.1rem 1.25rem;margin-bottom:1rem;}
.card h3{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--text2);margin-bottom:.9rem;font-weight:500;}
.frow{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.flabel{font-size:12px;color:var(--text2);width:110px;flex-shrink:0;}
.fi{flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-size:12px;padding:7px 10px;outline:none;font-family:monospace;}
.fi:focus{border-color:var(--accent);}
.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:.75rem;}
.btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s;}
.btn-p{background:var(--accent);color:#fff;}
.btn-s{background:var(--bg3);border:1px solid var(--border2);color:var(--text);}
.btn-s:hover{border-color:var(--accent);color:var(--accent);}
.btn-sm{padding:5px 11px;font-size:12px;}
.sbadge{font-size:11px;padding:3px 9px;border-radius:4px;background:rgba(59,158,255,.08);color:var(--accent);border:1px solid rgba(59,158,255,.2);display:none;}

/* TILES */
.tiles{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.25rem;}
.tile{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:1rem .75rem;text-align:center;cursor:pointer;transition:all .18s;user-select:none;}
.tile:active{transform:scale(.96);}
.tile.on{border-color:rgba(34,197,94,.5);background:rgba(34,197,94,.06);}
.tile-icon{width:40px;height:40px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;margin:0 auto .6rem;font-size:18px;}
.tile.on .tile-icon{background:rgba(34,197,94,.12);border-color:rgba(34,197,94,.4);}
.tile-name{font-size:13px;font-weight:600;margin-bottom:.2rem;}
.tile-state{font-size:11px;color:var(--text3);}
.tile.on .tile-state{color:var(--on);}

/* SEZIONE ORARI */
.sec-title{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.6rem;}
.out-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:.85rem;}
.out-tab{padding:6px 14px;border-radius:8px;border:1px solid var(--border2);background:none;color:var(--text2);font-size:12px;cursor:pointer;transition:all .15s;}
.out-tab:hover{border-color:var(--accent);color:var(--accent);}
.out-tab.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600;}

/* CALENDARIO */
.cal{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;margin-bottom:1rem;}
.cal-nav{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1rem;border-bottom:1px solid var(--border);}
.cal-title{font-size:13px;font-weight:600;}
.cal-btn{background:none;border:none;color:var(--text2);cursor:pointer;font-size:16px;padding:2px 8px;border-radius:6px;}
.cal-btn:hover{background:var(--bg3);color:var(--text);}
.cal-btn:disabled{opacity:.2;pointer-events:none;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;padding:.75rem;}
.cal-lbl{font-size:9px;color:var(--text3);text-align:center;padding-bottom:4px;}
.cal-day{height:34px;border-radius:6px;border:1px solid transparent;background:none;color:var(--text3);font-size:12px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;position:relative;}
.cal-day.today{border-color:var(--border2);color:var(--text);}
.cal-day.inrange{background:var(--bg3);color:var(--text);}
.cal-day.sel{background:var(--accent);color:#fff;border-color:var(--accent);}
.cal-day.hasslots::after{content:'';position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--on);}
.cal-day.sel.hasslots::after{background:#fff;}
.cal-day.disabled{opacity:.2;pointer-events:none;}

/* SLOT */
.slots-area{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;}
.slots-hdr{padding:.65rem 1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.slots-hdr-date{font-size:13px;font-weight:600;}
.slots-hdr-count{font-size:11px;color:var(--text3);}
.slot-row{display:flex;align-items:center;gap:10px;padding:.6rem 1rem;border-bottom:1px solid var(--border);}
.slot-n{font-size:11px;color:var(--text3);width:20px;flex-shrink:0;}
.slot-times{display:flex;align-items:center;gap:8px;flex:1;flex-wrap:wrap;}
.slot-lbl{font-size:11px;color:var(--text2);width:26px;}
.ti{background:#fff;border:1px solid #ccc;border-radius:6px;color:#000;font-size:14px;padding:6px 8px;outline:none;width:115px;}
.ti:focus{border-color:var(--accent);}
.slot-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;padding:4px 8px;margin-left:auto;}
.slot-del:hover{color:var(--danger);}
.add-slot{width:100%;padding:10px;background:none;border:none;border-top:1px solid var(--border);color:var(--text2);font-size:12px;cursor:pointer;}
.add-slot:hover{color:var(--accent);background:rgba(59,158,255,.04);}
.no-date-msg{padding:2rem;text-align:center;font-size:13px;color:var(--text3);}

/* RIEPILOGO */
.recap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;margin-bottom:1rem;}
.recap-hdr{padding:.65rem 1rem;border-bottom:1px solid var(--border);font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;}
.recap-out{border-bottom:1px solid var(--border);}
.recap-out-name{padding:.5rem 1rem;font-size:12px;font-weight:600;color:var(--accent);background:rgba(59,158,255,.04);}
.recap-row{display:flex;align-items:center;gap:10px;padding:.45rem 1rem;border-top:1px solid var(--border);font-size:12px;}
.recap-date{color:var(--text2);width:90px;flex-shrink:0;}
.recap-on{color:var(--on);}
.recap-off{color:var(--danger);}
.recap-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:12px;padding:2px 6px;margin-left:auto;}
.recap-del:hover{color:var(--danger);}
.recap-empty{padding:1rem;text-align:center;font-size:12px;color:var(--text3);}

/* TOAST */
.toast{position:fixed;bottom:1.1rem;right:1.1rem;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:9px 14px;font-size:13px;color:var(--text);transform:translateY(55px);opacity:0;transition:all .2s;z-index:999;max-width:270px;}
.toast.show{transform:translateY(0);opacity:1;}
.toast.ok{border-color:var(--on);color:#4ade80;}
.toast.err{border-color:var(--danger);color:#f87171;}
.toast.warn{border-color:var(--warn);color:var(--warn);}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-page" id="loginPage">
  <div class="login-box">
    <div class="login-logo">◈</div>
    <div class="login-title">Relay Control</div>
    <div class="login-sub">Inserisci la password per accedere</div>
    <input class="login-input" id="loginPass" type="password" placeholder="••••••••"
      onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">Accedi</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<nav>
  <div class="logo">◈ Relay Control</div>
  <div style="display:flex;align-items:center;gap:12px;">
    <div class="cstatus"><div class="cdot" id="cdot"></div><span id="cst">offline</span></div>
    <button class="logout-btn" onclick="doLogout()">Esci</button>
  </div>
</nav>

<!-- PAGINA ADMIN -->
<div id="pageAdmin" style="display:none">
  <div class="wrap">
    <div class="card">
      <h3>Configurazione Arduino Cloud</h3>
      <div class="frow"><div class="flabel">Thing ID</div><input class="fi" id="thingId" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"></div>
      <div class="frow"><div class="flabel">Client ID</div><input class="fi" id="clientId" placeholder="Client ID"></div>
      <div class="frow"><div class="flabel">Client Secret</div><input class="fi" id="clientSecret" type="password" placeholder="Secret"></div>
      <div class="actions">
        <button class="btn btn-p" onclick="connectCloud()">Connetti</button>
        <button class="btn btn-s" onclick="saveConfig()">Salva config</button>
        <button class="btn btn-s" onclick="doSyncRTC()">⏱ Sync orologio</button>
        <span class="sbadge" id="sbadge">✓ Sincronizzato</span>
      </div>
    </div>
    <div class="card">
      <h3>Test uscite</h3>
      <div class="tiles" id="adminTiles"></div>
    </div>
  </div>
</div>

<!-- PAGINA CLIENTE -->
<div id="pageClient" style="display:none">
  <div class="wrap">
    <div style="text-align:center;padding:1rem 0 1rem;">
      <div style="font-size:20px;font-weight:300;margin-bottom:4px;">Controllo Uscite</div>
      <div style="font-size:12px;color:var(--text2);" id="clTime">—</div>
    </div>

    <!-- TILE ON/OFF -->
    <div class="sec-title">Accensione manuale</div>
    <div class="tiles" id="clientTiles"></div>

    <!-- RIEPILOGO ORARI -->
    <div class="sec-title">Orari programmati</div>
    <div class="recap" id="recapArea"></div>

    <!-- PROGRAMMAZIONE -->
    <div class="sec-title">Aggiungi orario</div>
    <div class="out-tabs" id="outTabs"></div>
    <div class="cal" id="calArea"></div>
    <div class="slots-area" id="slotsArea"></div>

    <div class="actions" style="margin-top:1rem;">
      <button class="btn btn-p" onclick="sendAll()">📤 Invia orari a Controllore</button>
      <button class="btn btn-s" onclick="saveLocal()">💾 Salva</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── COSTANTI ────────────────────────────────────────────────────────────────
const PASS_ADMIN  = 'mitech2024';
const PASS_CLIENT = 'luci2024';
const PROXY       = 'https://arduino-proxy.mitech-tn.workers.dev';
const THING_ID    = '62565fa2-5143-4dcb-8269-b643985b6b79';
const MONTHS      = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
const ICONS       = ['💡','🌱','💧','🔆','🔌','⚙️'];
const OUT_NAMES   = ['Uscita 1','Uscita 2','Uscita 3','Uscita 4','Uscita 5','Uscita 6'];

// Property IDs (da aggiornare con i tuoi)
let PROP_IDS = {};

// ─── STATO ───────────────────────────────────────────────────────────────────
let userRole  = null;
let cfg       = {thingId:'',clientId:'',clientSecret:'',token:''};
let connected = false;
let outState  = [false,false,false,false,false,false];
let outNames  = [...OUT_NAMES];
// schedule[i] = array di {date:'YYYY-MM-DD', on:'HH:MM', off:'HH:MM'}
let schedule  = [[],[],[],[],[],[]];
let selOut    = 0;
let selDate   = null;
let calOffset = 0;

const today = new Date(); today.setHours(0,0,0,0);
const dk = d => { const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0'); return `${y}-${m}-${dd}`; };
const tdk = () => dk(today);
const addD = (d,n) => { const r=new Date(d); r.setDate(r.getDate()+n); return r; };
const pd = k => { const [y,m,d]=k.split('-').map(Number); return new Date(y,m-1,d); };
const fmtIT = k => { const d=pd(k); return `${d.getDate()} ${MONTHS[d.getMonth()]}`; };

// ─── LOGIN ───────────────────────────────────────────────────────────────────
function doLogin(){
  const p=document.getElementById('loginPass').value;
  if(p===PASS_ADMIN){
    userRole='admin';
    document.getElementById('loginPage').style.display='none';
    document.getElementById('pageAdmin').style.display='block';
    loadConfig(); loadLocal();
    renderAdminTiles();
    if(cfg.clientId&&cfg.clientSecret) connectCloud();
  } else if(p===PASS_CLIENT){
    userRole='client';
    document.getElementById('loginPage').style.display='none';
    document.getElementById('pageClient').style.display='block';
    loadConfig(); loadLocal();
    purgePast();
    renderAll();
    updateTime();
    if(cfg.clientId&&cfg.clientSecret) connectCloud();
  } else {
    document.getElementById('loginErr').textContent='Password errata';
    document.getElementById('loginPass').value='';
    setTimeout(()=>document.getElementById('loginErr').textContent='',2000);
  }
}
function doLogout(){
  userRole=null; connected=false;
  document.getElementById('pageAdmin').style.display='none';
  document.getElementById('pageClient').style.display='none';
  document.getElementById('loginPage').style.display='flex';
  document.getElementById('loginPass').value='';
  document.getElementById('cdot').classList.remove('ok');
  document.getElementById('cst').textContent='offline';
}

// ─── CONFIG & STORAGE ────────────────────────────────────────────────────────
function loadConfig(){
  const c=localStorage.getItem('rc6_cfg');
  if(c) cfg={...cfg,...JSON.parse(c)};
  ['thingId','clientId','clientSecret'].forEach(k=>{
    const el=document.getElementById(k); if(el) el.value=cfg[k]||'';
  });
}
function saveConfig(){
  cfg.thingId=document.getElementById('thingId').value.trim();
  cfg.clientId=document.getElementById('clientId').value.trim();
  cfg.clientSecret=document.getElementById('clientSecret').value.trim();
  localStorage.setItem('rc6_cfg',JSON.stringify(cfg));
  showToast('Configurazione salvata','ok');
}
function loadLocal(){
  const s=localStorage.getItem('rc6_sched');
  if(s) schedule=JSON.parse(s);
  const n=localStorage.getItem('rc6_names');
  if(n) outNames=JSON.parse(n);
}
function saveLocal(){
  localStorage.setItem('rc6_sched',JSON.stringify(schedule));
  localStorage.setItem('rc6_names',JSON.stringify(outNames));
  showToast('Salvato','ok');
}
function purgePast(){
  schedule.forEach((sl,i)=>{
    schedule[i]=sl.filter(s=>pd(s.date)>=today);
  });
}

// ─── CLOUD ───────────────────────────────────────────────────────────────────
async function connectCloud(){
  if(document.getElementById('clientId')) cfg.clientId=document.getElementById('clientId').value.trim()||cfg.clientId;
  if(document.getElementById('clientSecret')) cfg.clientSecret=document.getElementById('clientSecret').value.trim()||cfg.clientSecret;
  if(!cfg.clientId||!cfg.clientSecret){showToast('Credenziali mancanti','err');return;}
  try{
    const r=await fetch(`${PROXY}/iot/v1/clients/token`,{
      method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body:`grant_type=client_credentials&client_id=${encodeURIComponent(cfg.clientId)}&client_secret=${encodeURIComponent(cfg.clientSecret)}&audience=https://api2.arduino.cc/iot`
    });
    if(!r.ok) throw new Error('Auth fallita');
    cfg.token=(await r.json()).access_token;
    connected=true;
    document.getElementById('cdot').classList.add('ok');
    document.getElementById('cst').textContent='connesso';
    showToast('Connesso!','ok');
    // Carica property IDs e stato uscite
    await loadPropIds();
    await syncStates();
    // Rinnovo token ogni 4 minuti
    if(window._tkTimer) clearInterval(window._tkTimer);
    window._tkTimer=setInterval(async()=>{
      try{
        const r=await fetch(`${PROXY}/iot/v1/clients/token`,{
          method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},
          body:`grant_type=client_credentials&client_id=${encodeURIComponent(cfg.clientId)}&client_secret=${encodeURIComponent(cfg.clientSecret)}&audience=https://api2.arduino.cc/iot`
        });
        if(r.ok) cfg.token=(await r.json()).access_token;
      }catch(e){}
    },4*60*1000);
  }catch(e){showToast('Errore: '+e.message,'err');}
}

async function loadPropIds(){
  try{
    const r=await fetch(`${PROXY}/iot/v2/things/${THING_ID}/properties`,{
      headers:{'Authorization':'Bearer '+cfg.token}
    });
    const arr=await r.json();
    if(!Array.isArray(arr)) return;
    arr.forEach(p=>{ PROP_IDS[p.variable_name]=p.id; });
  }catch(e){}
}

async function cloudPut(name,value){
  if(!connected) return;
  const pid=PROP_IDS[name]; if(!pid) return;
  try{
    await fetch(`${PROXY}/iot/v1/things/${THING_ID}/properties/${pid}/publish`,{
      method:'PUT',
      headers:{'Authorization':'Bearer '+cfg.token,'Content-Type':'application/json'},
      body:JSON.stringify({value})
    });
  }catch(e){console.warn('PUT',name,e);}
}

async function syncStates(){
  try{
    const r=await fetch(`${PROXY}/iot/v2/things/${THING_ID}/properties`,{
      headers:{'Authorization':'Bearer '+cfg.token}
    });
    const arr=await r.json();
    if(!Array.isArray(arr)) return;
    ['out1','out2','out3','out4','out5','out6'].forEach((n,i)=>{
      const p=arr.find(x=>x.variable_name===n);
      if(p) outState[i]=p.last_value||false;
    });
    renderTiles();
  }catch(e){}
}

async function doSyncRTC(){
  const now=new Date(); const p=v=>String(v).padStart(2,'0');
  const s=`${now.getFullYear()}-${p(now.getMonth()+1)}-${p(now.getDate())}T${p(now.getHours())}:${p(now.getMinutes())}:${p(now.getSeconds())}`;
  await cloudPut('sync_time',s);
  const b=document.getElementById('sbadge'); b.style.display='inline';
  showToast('Orologio sincronizzato','ok');
  setTimeout(()=>b.style.display='none',4000);
}

// Invia orari per ogni uscita come stringa semplice
// Formato: "YYYY-MM-DD,HH:MM,HH:MM|YYYY-MM-DD,HH:MM,HH:MM|..."
async function sendAll(){
  if(!connected){showToast('Non connesso','err');return;}
  purgePast();
  const names=['out1','out2','out3','out4','out5','out6'];
  const snames=['sched1','sched2','sched3','sched4','sched5','sched6'];
  // Invia stato uscite
  for(let i=0;i<6;i++) await cloudPut(names[i],outState[i]);
  // Invia orari come stringa per ogni uscita
  // Formato: "YYYYMMDD|HHMM|HHMM~YYYYMMDD|HHMM|HHMM~..."
  for(let i=0;i<6;i++){
    const parts=[];
    for(let d=0;d<=5;d++){
      const k=dk(addD(today,d));
      const daySlots=schedule[i].filter(s=>s.date===k).slice(0,8);
      daySlots.forEach(s=>{
        // Converti "YYYY-MM-DD" in "YYYYMMDD" e "HH:MM" in "HHMM"
        const date=s.date.replace(/-/g,'');
        const on=s.on.replace(':','');
        const off=s.off.replace(':','');
        parts.push(`${date}|${on}|${off}`);
      });
    }
    await cloudPut(snames[i], parts.join('~'));
  }
  saveLocal();
  showToast('Inviato a Controllore!','ok');
}

// ─── TOGGLE USCITE ───────────────────────────────────────────────────────────
async function toggleOut(i){
  outState[i]=!outState[i];
  renderTiles();
  const n=['out1','out2','out3','out4','out5','out6'];
  if(connected) await cloudPut(n[i],outState[i]);
  else showToast('Offline — solo locale','warn');
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function renderTiles(){
  renderAdminTiles();
  renderClientTiles();
}

function renderAdminTiles(){
  const el=document.getElementById('adminTiles'); if(!el) return;
  el.innerHTML=outNames.map((n,i)=>`
    <div class="tile ${outState[i]?'on':''}" onclick="toggleOut(${i})">
      <div class="tile-icon">${ICONS[i]}</div>
      <div class="tile-name">${n}</div>
      <div class="tile-state">${outState[i]?'ACCESO':'SPENTO'}</div>
    </div>`).join('');
}

function renderClientTiles(){
  const el=document.getElementById('clientTiles'); if(!el) return;
  el.innerHTML=outNames.map((n,i)=>`
    <div class="tile ${outState[i]?'on':''}" onclick="toggleOut(${i})">
      <div class="tile-icon">${ICONS[i]}</div>
      <div class="tile-name">${n}</div>
      <div class="tile-state">${outState[i]?'ACCESO':'SPENTO'}</div>
    </div>`).join('');
}

function renderAll(){
  renderClientTiles();
  renderRecap();
  renderOutTabs();
  renderCal();
  renderSlots();
}

// ─── RIEPILOGO ───────────────────────────────────────────────────────────────
function renderRecap(){
  const el=document.getElementById('recapArea'); if(!el) return;
  let html='';
  let hasAny=false;
  outNames.forEach((n,i)=>{
    // Mostra solo slot futuri o di oggi
    const upcoming=schedule[i].filter(s=>pd(s.date)>=today)
      .sort((a,b)=>a.date.localeCompare(b.date)||a.on.localeCompare(b.on));
    if(!upcoming.length) return;
    hasAny=true;
    html+=`<div class="recap-out">
      <div class="recap-out-name">${ICONS[i]} ${n}</div>`;
    upcoming.forEach((s,si)=>{
      const origIdx=schedule[i].indexOf(s);
      html+=`<div class="recap-row">
        <span class="recap-date">${fmtIT(s.date)}</span>
        <span class="recap-on">🟢 ${s.on}</span>
        <span style="color:var(--text3);margin:0 2px;">→</span>
        <span class="recap-off">🔴 ${s.off}</span>
        <button class="recap-del" onclick="delFromRecap(${i},${origIdx})">✕</button>
      </div>`;
    });
    html+='</div>';
  });
  if(!hasAny) html='<div class="recap-empty">Nessun orario programmato</div>';
  el.innerHTML=html;
}

function delFromRecap(outIdx,slotIdx){
  schedule[outIdx].splice(slotIdx,1);
  renderRecap();
  renderSlots();
  renderOutTabs();
}

// ─── TABS USCITE ─────────────────────────────────────────────────────────────
function renderOutTabs(){
  const el=document.getElementById('outTabs'); if(!el) return;
  el.innerHTML=outNames.map((n,i)=>`
    <button class="out-tab ${i===selOut?'active':''}" onclick="selectOut(${i})">${n}</button>`
  ).join('');
}
function selectOut(i){ selOut=i; selDate=tdk(); calOffset=0; renderOutTabs(); renderCal(); renderSlots(); }

// ─── CALENDARIO ──────────────────────────────────────────────────────────────
function renderCal(){
  const el=document.getElementById('calArea'); if(!el) return;
  const wEnd=addD(today,5);
  const sov=addD(today,calOffset*7);
  const dow=(sov.getDay()+6)%7;
  const cStart=addD(sov,-dow);
  const mid=addD(cStart,10);
  const canPrev=calOffset>0, canNext=calOffset<1;

  let h=`<div class="cal-nav">
    <button class="cal-btn" onclick="calNav(-1)" ${!canPrev?'disabled':''}>‹</button>
    <span class="cal-title">${MONTHS[mid.getMonth()]} ${mid.getFullYear()}</span>
    <button class="cal-btn" onclick="calNav(1)" ${!canNext?'disabled':''}>›</button>
  </div>
  <div class="cal-grid">
    ${['Lu','Ma','Me','Gi','Ve','Sa','Do'].map(d=>`<div class="cal-lbl">${d}</div>`).join('')}`;

  for(let i=0;i<14;i++){
    const d=addD(cStart,i);
    const k=dk(d);
    const inRange=d>=today&&d<=wEnd;
    const isSel=k===selDate;
    const hasSlots=schedule[selOut].some(s=>s.date===k);
    let cls='cal-day';
    if(!inRange) cls+=' disabled';
    else if(dk(d)===tdk()) cls+=' today inrange';
    else cls+=' inrange';
    if(isSel) cls+=' sel';
    if(hasSlots) cls+=' hasslots';
    h+=`<button class="${cls}" onclick="selDate2('${k}')">${d.getDate()}</button>`;
  }
  h+='</div>';
  el.innerHTML=h;
}

function selDate2(k){ selDate=k; renderCal(); renderSlots(); }
function calNav(dir){ calOffset=Math.max(0,Math.min(1,calOffset+dir)); renderCal(); }

// ─── SLOT EDITOR ─────────────────────────────────────────────────────────────
function renderSlots(){
  const el=document.getElementById('slotsArea'); if(!el) return;
  if(!selDate){ el.innerHTML='<div class="no-date-msg">Seleziona una data</div>'; return; }

  const daySlots=schedule[selOut].filter(s=>s.date===selDate);
  const canAdd=daySlots.length<8;

  let h=`<div class="slots-hdr">
    <span class="slots-hdr-date">📅 ${fmtIT(selDate)}</span>
    <span class="slots-hdr-count">${daySlots.length}/8 slot</span>
  </div>`;

  daySlots.forEach((s,si)=>{
    const origIdx=schedule[selOut].findIndex(x=>x===s);
    h+=`<div class="slot-row">
      <span class="slot-n">${si+1}</span>
      <div class="slot-times">
        <span class="slot-lbl">ON</span>
        <input type="time" class="ti" value="${s.on}" onchange="setSlotTime(${origIdx},'on',this.value)">
        <span class="slot-lbl">OFF</span>
        <input type="time" class="ti" value="${s.off}" onchange="setSlotTime(${origIdx},'off',this.value)">
      </div>
      <button class="slot-del" onclick="delSlot(${origIdx})">✕</button>
    </div>`;
  });

  if(canAdd) h+=`<button class="add-slot" onclick="addSlot()">+ Aggiungi orario</button>`;
  else h+=`<div style="padding:.75rem;text-align:center;font-size:11px;color:var(--text3);">Massimo 8 orari per giorno</div>`;

  el.innerHTML=h;
}

function addSlot(){
  if(!selDate) return;
  const daySlots=schedule[selOut].filter(s=>s.date===selDate);
  if(daySlots.length>=8) return;
  schedule[selOut].push({date:selDate,on:'08:00',off:'22:00'});
  renderSlots(); renderRecap(); renderCal(); renderOutTabs();
}
function delSlot(idx){
  schedule[selOut].splice(idx,1);
  renderSlots(); renderRecap(); renderCal(); renderOutTabs();
}
function setSlotTime(idx,field,val){
  schedule[selOut][idx][field]=val;
  renderRecap();
}

// ─── UTILS ───────────────────────────────────────────────────────────────────
function updateTime(){
  const el=document.getElementById('clTime'); if(!el) return;
  const now=new Date();
  el.textContent=now.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'})+' — '+
    now.toLocaleDateString('it-IT',{weekday:'long',day:'numeric',month:'long'});
}
function showToast(msg,type=''){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast show'+(type?' '+type:'');
  setTimeout(()=>t.className='toast',2800);
}

setInterval(updateTime,60000);
selDate=tdk();
</script>
</body>
</html>
